# AI Scientist – Best-First Tree Search Configuration
# Adapted from AI-Scientist-v2/bfts_config.yaml for Claude Code skills.

# ── Data ─────────────────────────────────────────────────────────────────────
data_dir: "data"
preprocess_data: false
copy_data: true

# ── Task description ─────────────────────────────────────────────────────────
# Either desc_file (path to .md) or goal (inline string) must be set.
desc_file: null
goal: null
eval: null

# ── Directories ──────────────────────────────────────────────────────────────
log_dir: logs
workspace_dir: workspaces

# ── Experiment naming ────────────────────────────────────────────────────────
exp_name: run

# ── Code execution ───────────────────────────────────────────────────────────
exec:
  timeout: 3600          # Max seconds per experiment run. Increase for large models.
  agent_file_name: runfile.py

# ── Report generation ────────────────────────────────────────────────────────
generate_report: true

# ── Experiment settings ──────────────────────────────────────────────────────
experiment:
  num_syn_datasets: 1

# ── Agent (tree search) ─────────────────────────────────────────────────────
agent:
  type: parallel
  num_workers: 2
  # How many parallel agents to launch during BFTS tree search.
  # Recommendations:
  #   - Single GPU: 1-2 (avoid GPU contention)
  #   - Multi-GPU: 2-4 (one per 1-2 GPUs)
  #   - CPU-only: 2-4 (limited by core count and memory)
  #   - Claude Max: 2 is safe; higher may hit rate limits

  # Per-stage iteration limits
  # More iterations = better results but higher cost.
  # Quick test: 5/3/3/3. Full run: 20/12/12/18.
  stages:
    stage1_max_iters: 20   # Initial implementation — most attempts needed
    stage2_max_iters: 12   # Baseline tuning — hyperparameter search
    stage3_max_iters: 12   # Creative research — architecture changes
    stage4_max_iters: 18   # Ablation studies — systematic evaluation

  # Fallback if stage-specific limits not provided
  steps: 5

  # Validation settings
  k_fold_validation: 1     # Number of validation folds (1 = single split)
  data_preview: false       # Preview data before running experiments
  expose_prediction: false  # Show model predictions in output

  # Tree search strategy
  search:
    max_debug_depth: 3     # Max consecutive debug retries on a buggy node
    debug_prob: 0.5        # Probability of retrying a failed node vs trying new
    num_drafts: 3          # Initial root nodes per stage (parallel first attempts)

# ── Paper writeup ────────────────────────────────────────────────────────────
writeup_type: icbinb       # "icbinb" (4-page workshop) or "icml" (8-page conference)
num_cite_rounds: 5         # Literature search rounds during writing
num_writeup_reflections: 3 # Self-review rounds before finalizing

# ── Pipeline control ─────────────────────────────────────────────────────────
skip_writeup: false        # Skip paper generation (experiment only)
skip_review: false         # Skip peer review

# ── Scientific skills (optional — requires claude-scientific-skills plugin) ──
scientific_skills:
  enabled: auto              # auto (use if plugin installed) | true | false
  enhanced_literature: true  # /research-lookup, /database-lookup during ideation
  enhanced_writing: true     # /scientific-writing + /citation-management during writeup
  enhanced_figures: true     # /scientific-visualization during plot phase
  enhanced_review: true      # /scientific-critical-thinking during review

# ── Codex integration (optional — requires codex-plugin-cc) ─────────────────
codex:
  enabled: auto              # auto (use if CLI + plugin installed) | true | false
  stage_gate_review: true    # Adversarial code review between BFTS stages
  panel_paper_review: true   # 3-persona panel review of final paper
  code_alignment: true       # Verify paper claims match experiment code
  rescue_on_stuck: true      # Delegate to Codex when experiments are stuck
  venue: auto                # auto (from writeup_type) | neurips | icml | iclr | workshop

# ── Compute backend ──────────────────────────────────────────────────────────
compute:
  backend: ""                  # "" (prompt on first run) | "local" | "modal"
  modal:
    gpu: "A100"                # A100 | H100 | T4 | L4
    timeout: 3600              # Max seconds per Modal job
    image: "python:3.12"       # Base Docker image for Modal

# ── Revision loop (optional — re-review and revise if score is low) ─────────
revision:
  enabled: false               # Opt-in: write → review → revise → re-review
  score_threshold: 5           # Re-run if Overall score < this (1-10 scale)
  max_passes: 2                # Max revision cycles (prevent infinite loops)
  prompt_before_revision: true # Ask user before each revision pass
